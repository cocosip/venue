name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for changelog generation

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -race -v ./...

    - name: Build multi-platform binaries
      run: |
        # Create output directory
        mkdir -p dist

        # Linux AMD64
        GOOS=linux GOARCH=amd64 go build -o dist/venue-linux-amd64 -ldflags="-s -w -X main.Version=${{ github.ref_name }}" ./venue.go

        # Linux ARM64
        GOOS=linux GOARCH=arm64 go build -o dist/venue-linux-arm64 -ldflags="-s -w -X main.Version=${{ github.ref_name }}" ./venue.go

        # Windows AMD64
        GOOS=windows GOARCH=amd64 go build -o dist/venue-windows-amd64.exe -ldflags="-s -w -X main.Version=${{ github.ref_name }}" ./venue.go

        # macOS AMD64
        GOOS=darwin GOARCH=amd64 go build -o dist/venue-darwin-amd64 -ldflags="-s -w -X main.Version=${{ github.ref_name }}" ./venue.go

        # macOS ARM64 (Apple Silicon)
        GOOS=darwin GOARCH=arm64 go build -o dist/venue-darwin-arm64 -ldflags="-s -w -X main.Version=${{ github.ref_name }}" ./venue.go

    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
        cat checksums.txt

    - name: Create archive files
      run: |
        cd dist

        # Linux AMD64
        tar -czf venue-linux-amd64.tar.gz venue-linux-amd64

        # Linux ARM64
        tar -czf venue-linux-arm64.tar.gz venue-linux-arm64

        # Windows AMD64
        zip venue-windows-amd64.zip venue-windows-amd64.exe

        # macOS AMD64
        tar -czf venue-darwin-amd64.tar.gz venue-darwin-amd64

        # macOS ARM64
        tar -czf venue-darwin-arm64.tar.gz venue-darwin-arm64

    - name: Generate changelog
      id: changelog
      run: |
        # Get the previous tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        # Generate changelog
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi

        # Save to file for GitHub Release
        echo "## Changes" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "$CHANGELOG" >> CHANGELOG.md

        cat CHANGELOG.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/venue-linux-amd64.tar.gz
          dist/venue-linux-arm64.tar.gz
          dist/venue-windows-amd64.zip
          dist/venue-darwin-amd64.tar.gz
          dist/venue-darwin-arm64.tar.gz
          dist/checksums.txt
        body_path: CHANGELOG.md
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ secrets.DOCKER_USERNAME }}/venue
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true
